<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ChatWave 💬</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f0f0f0;
}

/* HEADER */
.header {
  background: #075e54;
  color: white;
  padding: 12px;
  font-weight: bold;
}

/* CHAT LIST */
#chatList {
  height: 85vh;
  overflow-y: auto;
}

.user {
  background: white;
  margin: 5px;
  padding: 15px;
  border-radius: 8px;
  cursor: pointer;
}

/* CHAT SCREEN */
#chatScreen {
  display: none;
  height: 75vh;
  overflow-y: auto;
  padding: 10px;
}

/* BUBBLES */
.box {
  max-width: 70%;
  padding: 8px;
  margin: 6px;
  border-radius: 10px;
  clear: both;
}

.me { background: #dcf8c6; float: right; }
.other { background: white; float: left; }

/* INPUT */
.input-bar {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
}

button {
  background: #128c7e;
  color: white;
  border: none;
  padding: 10px;
}

/* BACK BUTTON */
.back {
  background: #075e54;
  color: white;
  padding: 10px;
  border: none;
}
</style>
</head>

<body>

<div class="header">ChatWave 💬</div>

<!-- AUTH -->
<div id="authBox">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <button onclick="signup()">Signup</button>
</div>

<!-- CHAT LIST -->
<div id="chatList"></div>

<!-- CHAT SCREEN -->
<div id="chatScreen">
  <button class="back" onclick="back()">⬅ Back</button>
  <div id="messages"></div>
</div>

<!-- INPUT -->
<div class="input-bar">
  <input id="msg" placeholder="Message">
  <button onclick="sendMessage()">Send</button>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
