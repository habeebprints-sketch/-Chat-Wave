<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ChatWave 💬</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f0f2f5;
      text-align: center;
    }

    h1 {
      background: green;
      color: white;
      margin: 0;
      padding: 10px;
    }

    input, button {
      width: 85%;
      padding: 10px;
      margin: 5px;
    }

    button {
      background: green;
      color: white;
      border: none;
    }

    #chat, #status, #channels {
      display: none;
      height: 25vh;
      overflow-y: auto;
      padding: 10px;
    }

    .box {
      background: white;
      margin: 5px;
      padding: 10px;
      border-radius: 10px;
      text-align: left;
    }

    video {
      width: 45%;
      border-radius: 10px;
      margin: 5px;
    }
  </style>
</head>

<body>

<h1>ChatWave 💬</h1>

<!-- AUTH -->
<div id="authBox">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<hr>

<!-- NAV -->
<button onclick="showChat()">Chat</button>
<button onclick="showStatus()">Status</button>
<button onclick="showChannels()">Channels</button>

<hr>

<!-- CHAT -->
<div id="chat"></div>
<input id="msg" placeholder="Message">
<button onclick="sendMessage()">Send</button>

<!-- STATUS -->
<div id="status"></div>
<button onclick="postStatus()">Post Status</button>

<!-- CHANNELS -->
<div id="channels"></div>
<button onclick="createChannel()">Create Channel</button>

<hr>

<!-- CALL -->
<button onclick="callUser()">📞 Call User</button>

<!-- VIDEO AREA -->
<video id="localVideo" autoplay muted></video>
<video id="remoteVideo" autoplay></video>

<script type="module" src="app.js"></script>

</body>
</html>
